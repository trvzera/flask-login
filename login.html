<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body style="padding:0px; margin:0px; box-sizing:border-box;">
  <section style="height: 100vh; display: flex; align-items: center; justify-content: center; background-color:#1c1c1e; ">
    <div style="font-family: Arial, Helvetica, sans-serif; display: flex; flex-direction:column; align-items: center; width:max-content; height:max-content;background-color:#dfdfdf; padding: 20px 60px; border-radius: 15px; border:3px solid #fff; box-shadow:inset 3px 3px 7px rgba(0, 0, 0, 0.3), inset 3px 3px 7px rgba(255, 255, 255, 1);">
      <h2 style="font-size: 3rem; color: #bababe">Login</h2>
      <form method="POST" style="display: flex; align-items: center; flex-direction:column;">
        <input type="text" name="user" placeholder="Usuário" style="height: 40px; width: 250px; border-radius: 6px; outline: none; border:2px solid #fff;padding: 5px 10px; background-color: #dfdfdf "><br><br>
        <input type="password" name="senha" placeholder="Senha" style="height: 40px; width: 250px; border-radius: 6px; outline: none; border:2px solid #fff;padding: 5px 10px; background-color: #dfdfdf"><br><br>
        <button type="submit" style="width: 100%; height: 40px; border-radius: 10px; outline: none; border: 1px solid #fff">Entrar</button>
      </form>
    </div>
  </section>
</body>

</html>
